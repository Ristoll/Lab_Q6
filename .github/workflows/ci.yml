name: CI Pipeline

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, review_requested]
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest --junitxml=report.xml
      
  analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count lines of code with Cloc
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc
          cloc src/ > cloc-report.txt
          cat cloc-report.txt

      - name: Run SonarCloud Analysis
        uses: SonarSource/sonarqube-scan-action@96cc37f786d240a6d001d52856df1f0cf36a1a29
        with:
          args: >
            -Dsonar.projectKey=Ristoll_Lab_Q6
            -Dsonar.organization=ristoll
            -Dsonar.sources=src
            -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Запуск flake8 через Reviewdog
        uses: reviewdog/action-flake8@b65981e158319f08cb7d0132f28bc0081e110adc
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error

      - name: Запуск Black через Reviewdog
        uses: reviewdog/action-black@644053a260402bc4278a865906107bd8aef7fae8
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: info
          
  review-check:
    name: Code Review Check for develop
    runs-on: ubuntu-latest
    needs: analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Перевірка наявності схваленого код-рев’ю
        uses: actions/github-script@v6
        with:
          script: |
            if (!context.payload.pull_request) {
              core.info("Workflow не запущено від PR, пропускаємо перевірку");
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const approved = reviews.some(review => review.state === 'APPROVED');
            if (!approved) {
              core.setFailed("Код-рев’ю не схвалено");
            }
